<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Primkart Kitchenware</title>
  <style>
    body {
      background-color: #0A1628;
      color: #F5F0E8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background-color: #152847;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 32px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 16px 0;
    }
    p {
      color: #8FA3BF;
      max-w: 400px;
      line-height: 1.5;
      margin: 0 0 32px 0;
    }
    button {
      background-color: #1E90FF;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🔌</div>
  <h1>You are offline</h1>
  <p>It seems your device has lost its internet connection. Please check your network and try again to access Primkart Kitchenware.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
